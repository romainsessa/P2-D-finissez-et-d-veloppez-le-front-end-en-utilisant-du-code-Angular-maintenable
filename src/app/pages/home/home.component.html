<h2>Olympic games app</h2>
<hr/>
<div>
  <div>
    <div class="center">
      <div>{{ titlePage }}</div>
    </div>
    <div class="split">
      <div>
        <p>Number of countries</p>
        <p>{{ totalCountries }}</p>
      </div>
      <div>
        <p>Number of JOs</p>
        <p>{{ totalJOs }}</p>
      </div>
    </div>
  </div>
  <app-pie-chart
    [countries]="countries"
    [medals]="medals"
    chartId="DashboardPieChart"
    (countryClicked)="onCountryClicked($event)">
  </app-pie-chart>  
</div>
